<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>コンビニ痩せ商品150選</title>
<style>
  :root{
    --brand:#EE7623; --brand2:#2E7D6B;
    --bg:#F7F5EC; --card:#FFFFFF; --ink:#2B3A45; --muted:#8A95A0;
    --line:#ECE7D8; --chip:#F0EEE4;
    --seven:#FF7A00; --lawson:#0068B7; --famima:#009A44;
    --shadow:0 4px 16px rgba(43,58,69,.08);
  }
  *{box-sizing:border-box}
  html,body{overflow-x:hidden}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
    line-height:1.6; -webkit-text-size-adjust:100%;
  }
  header{
    background:var(--bg); border-bottom:3px solid var(--brand);
    padding:14px 16px 12px; position:sticky; top:0; z-index:20;
  }
  .brand{font-size:12px; font-weight:700; color:var(--brand); letter-spacing:.08em}
  h1{margin:2px 0 2px; font-size:22px; letter-spacing:.02em}
  .sub{font-size:12px; color:var(--muted)}
  .storeicons{display:flex; gap:8px; margin:0 0 8px}
  .sicon{position:relative; overflow:hidden; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px; box-shadow:var(--shadow)}
  .sicon.seven{background:var(--seven)}
  .sicon.lawson{background:var(--lawson)}
  .sicon.famima{background:var(--famima)}
  .sicon img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block}
  .guide{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px}
  .guide span{background:#fff; border:1px solid var(--line); border-radius:999px; padding:5px 12px; font-size:12px; font-weight:700; box-shadow:var(--shadow)}
  .guide b{color:var(--brand)}
  .guide .g2 b{color:var(--brand2)}
  .controls{max-width:1100px; margin:14px auto 0; padding:0 16px}
  .stores{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px}
  .storebtn{border:1.5px solid var(--line); background:#fff; color:var(--ink); border-radius:999px; padding:8px 16px; font-size:13px; font-weight:700; cursor:pointer; transition:.15s; box-shadow:var(--shadow)}
  .storebtn[data-active="1"]{color:#fff; border-color:transparent}
  .storebtn.all[data-active="1"]{background:var(--ink)}
  .storebtn.seven[data-active="1"]{background:var(--seven)}
  .storebtn.lawson[data-active="1"]{background:var(--lawson)}
  .storebtn.famima[data-active="1"]{background:var(--famima)}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end}
  .field{flex:1 1 200px; min-width:140px}
  label.lbl{font-size:11px; color:var(--muted); font-weight:700; display:block; margin:0 0 3px 2px}
  select,input[type="search"]{width:100%; border:1.5px solid var(--line); border-radius:12px; padding:11px 12px; font-size:16px; background:#fff; color:var(--ink); font-family:inherit}
  input[type="search"]:focus,select:focus{outline:none; border-color:var(--brand)}
  .count{max-width:1100px; margin:14px auto 0; padding:0 16px; font-size:13px; color:var(--muted)}
  .count b{color:var(--ink); font-size:16px}
  .grid{max-width:1100px; margin:10px auto 40px; padding:0 16px; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px}
  .cardproduct{background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column}
  .thumb{position:relative; aspect-ratio:16/10; display:flex; align-items:center; justify-content:center; background:#fbfaf5}
  .thumb .emoji{font-size:52px; line-height:1}
  .thumb img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain; display:block; padding:6px; background:#fff}
  .badge-store{position:absolute; top:8px; left:8px; color:#fff; font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; z-index:2}
  .badge-store.seven{background:var(--seven)}
  .badge-store.lawson{background:var(--lawson)}
  .badge-store.famima{background:var(--famima)}
  .badge-check{position:absolute; top:8px; right:8px; background:#fff7ed; color:#b45309; border:1px solid #fed7aa; font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; z-index:2}
  .pbody{padding:11px 12px 13px; display:flex; flex-direction:column; gap:8px; flex:1}
  .cat{align-self:flex-start; background:var(--chip); color:#5c6670; font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px}
  .pname{font-size:14.5px; font-weight:700; line-height:1.35; min-height:2.7em}
  .stats{display:grid; grid-template-columns:1fr 1fr; gap:6px}
  .stat{background:#faf9f3; border:1px solid var(--line); border-radius:9px; padding:5px 8px; text-align:center}
  .stat .k{font-size:10px; color:var(--muted); font-weight:700}
  .stat .v{font-size:15px; font-weight:800}
  .stat .v small{font-size:10px; font-weight:700}
  .stat.kcal .v{color:var(--brand)}
  .stat.pro .v{color:var(--brand2)}
  .note{font-size:11.5px; color:#6b7680; line-height:1.5}
  .empty{max-width:1100px; margin:30px auto; padding:0 16px; text-align:center; color:var(--muted)}
  footer{border-top:1px solid var(--line); padding:18px 16px 40px; font-size:11.5px; color:var(--muted); max-width:1100px; margin:0 auto; line-height:1.7}
  code{background:#efece0; padding:1px 5px; border-radius:5px; font-size:11px}

  /* ===== スマホ最適化 ===== */
  @media (max-width:560px){
    header{padding:12px 14px 10px}
    h1{font-size:19px}
    .controls{margin-top:12px; padding:0 12px}
    .field{flex:1 1 46%; min-width:120px}
    .field.wide{flex:1 1 100%}
    .count{padding:0 12px}
    .grid{grid-template-columns:repeat(2,1fr); gap:10px; padding:0 12px}
    .thumb .emoji{font-size:38px}
    .pbody{padding:9px 9px 11px; gap:6px}
    .pname{font-size:12.5px; min-height:2.6em}
    .cat{font-size:10px; padding:2px 7px}
    .stat{padding:4px 5px}
    .stat .v{font-size:12.5px}
    .stat .k{font-size:9px}
    .note{font-size:10.5px}
    .storebtn{padding:7px 13px; font-size:12px}
    .sicon{width:30px; height:30px; font-size:14px}
    .guide span{font-size:11px; padding:4px 10px}
  }
  @media (max-width:340px){ .grid{grid-template-columns:1fr} }
  /* PCではヘッダー（アイコン＋タイトル）を中央寄せ */
  @media (min-width:561px){
    header{text-align:center}
    .storeicons{justify-content:center}
  }
</style>
</head>

<div class="count" id="count"></div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">条件に合う商品が見つかりませんでした。<br>フィルターを変えてみてください。</div>

</footer>

/* ---- メタ ---- */
const STORES=[
  {key:'',label:'すべて',cls:'all'},
  {key:'seven',label:'セブン',cls:'seven'},
  {key:'lawson',label:'ローソン',cls:'lawson'},
  {key:'famima',label:'ファミマ',cls:'famima'}
];
const STORE_LABEL={seven:'セブン',lawson:'ローソン',famima:'ファミマ'};
const CATS=[
  {key:'ご飯',emoji:'🍙'},{key:'パン',emoji:'🥪'},{key:'麺',emoji:'🍜'},
  {key:'主菜',emoji:'🍗'},{key:'サラダ',emoji:'🥗'},{key:'副菜',emoji:'🥚'},{key:'スープ',emoji:'🍲'}
];
const CAT_EMOJI=Object.fromEntries(CATS.map(c=>[c.key,c.emoji]));

const state={store:'',cat:'',q:'',sort:'def'};

const elStores=document.getElementById('stores');
STORES.forEach(s=>{
  const b=document.createElement('button');
  b.className='storebtn '+s.cls; b.textContent=s.label;
  b.dataset.store=s.key; b.dataset.active=s.key===state.store?'1':'0';
  b.onclick=()=>{state.store=s.key; [...elStores.children].forEach(x=>x.dataset.active=x.dataset.store===s.key?'1':'0'); render();};
  elStores.appendChild(b);
});
const elCat=document.getElementById('cat');
CATS.forEach(c=>{const o=document.createElement('option');o.value=c.key;o.textContent=`${c.emoji} ${c.key}`;elCat.appendChild(o);});
elCat.onchange=e=>{state.cat=e.target.value;render();};
document.getElementById('sort').onchange=e=>{state.sort=e.target.value;render();};
document.getElementById('q').oninput=e=>{state.q=e.target.value.trim();render();};

const elGrid=document.getElementById('grid');
const elCount=document.getElementById('count');
const elEmpty=document.getElementById('empty');

function render(){
  let list=PRODUCTS.filter(p=>{
    if(state.store&&p.store!==state.store)return false;
    if(state.cat&&p.cat!==state.cat)return false;
    if(state.q){const q=state.q.toLowerCase(); if(!(p.name.toLowerCase().includes(q)||p.note.toLowerCase().includes(q)))return false;}
    return true;
  });
  if(state.sort==='kcal')list.sort((a,b)=>a.kcal-b.kcal);
  else if(state.sort==='pro')list.sort((a,b)=>b.p-a.p);
  else if(state.sort==='fat')list.sort((a,b)=>a.f-b.f);
  elCount.innerHTML=`該当 <b>${list.length}</b> 商品`;
  elGrid.innerHTML=list.map(card).join('');
  elEmpty.style.display=list.length?'none':'block';
}

/* 画像の自動探索：jpg → jpeg → png の順に試し、無ければアイコン表示 */
function imgFallback(el){
  const exts=(el.dataset.exts||'').split(',').filter(Boolean);
  if(exts.length){ const n=exts.shift(); el.dataset.exts=exts.join(','); el.src=el.dataset.base+'.'+n; }
  else { el.remove(); }
}
function card(p){
  const emoji=CAT_EMOJI[p.cat]||'🍱';
  const check=p.ok?'':`<div class="badge-check">要確認</div>`;
  const imgTag = p.img
    ? `<img src="${p.img}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.remove()">`
    : `<img src="商品画像/${p.id}.jpg" data-base="商品画像/${p.id}" data-exts="jpeg,png" alt="${escapeHtml(p.name)}" loading="lazy" onerror="imgFallback(this)">`;
  return `
  <article class="cardproduct">
    <div class="thumb">
      <span class="emoji">${emoji}</span>
      ${imgTag}
      <div class="badge-store ${p.store}">${STORE_LABEL[p.store]}</div>
      ${check}
    </div>
    <div class="pbody">
      <span class="cat">${emoji} ${p.cat}</span>
      <div class="pname">${escapeHtml(p.name)}</div>
      <div class="stats">
        <div class="stat kcal"><div class="k">カロリー</div><div class="v">${p.kcal}<small>kcal</small></div></div>
        <div class="stat pro"><div class="k">たんぱく質</div><div class="v">${p.p}<small>g</small></div></div>
        <div class="stat"><div class="k">脂質</div><div class="v">${p.f}<small>g</small></div></div>
        <div class="stat"><div class="k">炭水化物</div><div class="v">${p.c}<small>g</small></div></div>
      </div>
      <div class="note">${escapeHtml(p.note)}</div>
    </div>
  </article>`;
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
render();
</script>
